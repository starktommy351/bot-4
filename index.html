
<!DOCTYPE html> <html lang="bn"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>AI চ্যাটবট</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; } .chat-container { width: 100%; max-width: 500px; height: 90vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; overflow: hidden; } .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 25px; display: flex; align-items: center; gap: 15px; } .bot-avatar { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; animation: pulse 2s infinite; } @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } } .header-info h2 { font-size: 18px; font-weight: 600; } .header-info p { font-size: 12px; opacity: 0.8; } .status-dot { width: 8px; height: 8px; background: #34d399; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } } .chat-messages { flex: 1; padding: 20px; overflow-y: auto; scroll-behavior: smooth; background: linear-gradient(180deg, rgba(15, 12, 41, 0.9), rgba(36, 36, 62, 0.9)); } .chat-messages::-webkit-scrollbar { width: 6px; } .chat-messages::-webkit-scrollbar-track { background: transparent; } .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; } .message { margin-bottom: 16px; display: flex; gap: 10px; animation: slideIn 0.4s ease-out; } @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } } .message.bot { justify-content: flex-start; } .message.user { justify-content: flex-end; } .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; } .message.bot .msg-avatar { background: linear-gradient(135deg, #667eea, #764ba2); } .message.user .msg-avatar { background: linear-gradient(135deg, #34d399, #059669); order: 2; } .message-content { max-width: 75%; } .message-bubble { padding: 12px 18px; border-radius: 18px; word-wrap: break-word; line-height: 1.5; font-size: 14px; white-space: pre-wrap; } .message.bot .message-bubble { background: rgba(102, 126, 234, 0.2); color: #e0e0ff; border: 1px solid rgba(102, 126, 234, 0.3); border-bottom-left-radius: 4px; } .message.user .message-bubble { background: linear-gradient(135deg, #34d399, #059669); color: white; border-bottom-right-radius: 4px; } .message-time { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 4px; padding: 0 5px; } .message.user .message-time { text-align: right; } .typing-indicator { display: none; margin-bottom: 16px; animation: slideIn 0.3s; } .typing-indicator.show { display: flex; gap: 10px; align-items: center; } .typing-dots { display: flex; gap: 4px; padding: 12px 18px; background: rgba(102, 126, 234, 0.2); border-radius: 18px; border: 1px solid rgba(102, 126, 234, 0.3); } .typing-dots span { width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: typingBounce 1.4s infinite; } .typing-dots span:nth-child(2) { animation-delay: 0.2s; } .typing-dots span:nth-child(3) { animation-delay: 0.4s; } @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } } .chat-input-area { padding: 16px 20px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 10px; align-items: center; } #userInput { flex: 1; padding: 14px 20px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; color: white; font-size: 14px; outline: none; transition: all 0.3s; } #userInput::placeholder { color: rgba(255, 255, 255, 0.4); } #userInput:focus { border-color: #667eea; background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 15px rgba(102, 126, 234, 0.3); } #sendBtn { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; transition: all 0.3s; flex-shrink: 0; } #sendBtn:hover { transform: scale(1.1); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5); } #sendBtn:active { transform: scale(0.95); } #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; } .welcome-message { text-align: center; padding: 30px 20px; } .welcome-message .emoji { font-size: 60px; margin-bottom: 15px; } .welcome-message h3 { color: #e0e0ff; margin-bottom: 8px; } .welcome-message p { color: rgba(255, 255, 255, 0.5); font-size: 13px; } .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; } .suggestion-btn { padding: 8px 16px; background: rgba(102, 126, 234, 0.15); border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 20px; color: #a0a0ff; font-size: 12px; cursor: pointer; transition: all 0.3s; } .suggestion-btn:hover { background: rgba(102, 126, 234, 0.3); color: white; } .error-msg { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); border: 1px solid rgba(255, 107, 107, 0.3); } @media (max-width: 480px) { body { padding: 0; } .chat-container { height: 100vh; border-radius: 0; max-width: 100%; } } </style> </head> <body> <div class="chat-container"> <div class="chat-header"> <div class="bot-avatar">🤖</div> <div class="header-info"> <h2>AI চ্যাটবট</h2> <p><span class="status-dot"></span>অনলাইন | সব প্রশ্নের উত্তর</p> </div> </div> <div class="chat-messages" id="chatMessages"> <div class="welcome-message" id="welcomeMsg"> <div class="emoji">🧠</div> <h3>AI চ্যাটবটে স্বাগতম!</h3> <p>আমি যেকোনো প্রশ্নের উত্তর দিতে পারি। নিচে কিছু সাজেশন দেওয়া হলো:</p> <div class="suggestions"> <button class="suggestion-btn" onclick="askSuggestion('তুমি কে?')">তুমি কে?</button> <button class="suggestion-btn" onclick="askSuggestion('বাংলাদেশ সম্পর্কে বলো')">বাংলাদেশ সম্পর্কে বলো</button> <button class="suggestion-btn" onclick="askSuggestion('একটি কবিতা লেখো')">একটি কবিতা লেখো</button> <button class="suggestion-btn" onclick="askSuggestion('প্রোগ্রামিং শিখতে চাই')">প্রোগ্রামিং শিখতে চাই</button> </div> </div> </div> <div class="typing-indicator" id="typingIndicator"> <div class="msg-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">🤖</div> <div class="typing-dots"> <span></span> <span></span> <span></span> </div> </div> <div class="chat-input-area"> <input type="text" id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." /> <button id="sendBtn" onclick="sendMessage()">➤</button> </div> </div> <script> // ⚠️ আপনার API কী এখানে বসান (কখনো পাবলিকলি শেয়ার করবেন না!) const GEMINI_API_KEY = 'AIzaSyBNQkmTluNpeqn6eC2A7Zgn3kvm132zgWk
'; const chatMessages = document.getElementById('chatMessages'); const userInput = document.getElementById('userInput'); const sendBtn = document.getElementById('sendBtn'); const typingIndicator = document.getElementById('typingIndicator'); const welcomeMsg = document.getElementById('welcomeMsg'); let conversationHistory = []; function getTime() { const now = new Date(); return now.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }); } function addMessage(text, isUser) { if (welcomeMsg) welcomeMsg.style.display = 'none'; const messageDiv = document.createElement('div'); messageDiv.className = `message ${isUser ? 'user' : 'bot'}`; const avatarDiv = document.createElement('div'); avatarDiv.className = 'msg-avatar'; avatarDiv.textContent = isUser ? '👤' : '🤖'; const contentDiv = document.createElement('div'); contentDiv.className = 'message-content'; const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'message-bubble'; bubbleDiv.textContent = text; const timeDiv = document.createElement('div'); timeDiv.className = 'message-time'; timeDiv.textContent = getTime(); contentDiv.appendChild(bubbleDiv); contentDiv.appendChild(timeDiv); messageDiv.appendChild(avatarDiv); messageDiv.appendChild(contentDiv); chatMessages.appendChild(messageDiv); chatMessages.scrollTop = chatMessages.scrollHeight; } function showTyping(show) { typingIndicator.className = show ? 'typing-indicator show' : 'typing-indicator'; if (show) chatMessages.scrollTop = chatMessages.scrollHeight; } async function getAIResponse(userMessage) { conversationHistory.push({ role: "user", parts: [{ text: userMessage }] }); const requestBody = { contents: conversationHistory, generationConfig: { temperature: 0.8, maxOutputTokens: 2048, }, systemInstruction: { parts: [{ text: "তুমি একটি বাংলা AI চ্যাটবট। তোমার নাম 'AI বট'। তুমি সবসময় বাংলায় উত্তর দেবে। তুমি বন্ধুসুলভ, সহায়ক এবং বিস্তারিত উত্তর দেবে। যেকোনো বিষয়ে তুমি সাহায্য করতে পারো - পড়াশোনা, প্রোগ্রামিং, সাধারণ জ্ঞান, কবিতা, গল্প, পরামর্শ ইত্যাদি।" }] } }; try { const response = await fetch( `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) } ); if (!response.ok) { throw new Error(`API Error: ${response.status}`); } const data = await response.json(); if (data.candidates && data.candidates[0] && data.candidates[0].content) { const botReply = data.candidates[0].content.parts[0].text; conversationHistory.push({ role: "model", parts: [{ text: botReply }] }); return botReply; } else { throw new Error('No response from API'); } } catch (error) { console.error('Error:', error); if (error.message.includes('401') || error.message.includes('403')) { return '❌ API কী ভুল বা মেয়াদ শেষ। অনুগ্রহ করে সঠিক API কী দিন।'; } else if (error.message.includes('429')) { return '⏳ অনেক বেশি রিকোয়েস্ট হয়েছে। একটু পরে আবার চেষ্টা করুন।'; } else if (error.message.includes('Failed to fetch')) { return '🌐 ইন্টারনেট সংযোগ নেই। অনুগ্রহ করে সংযোগ চেক করুন।'; } return '❌ দুঃখিত, একটি সমস্যা হয়েছে। আবার চেষ্টা করুন।'; } } async function sendMessage() { const message = userInput.value.trim(); if (message === '') return; addMessage(message, true); userInput.value = ''; sendBtn.disabled = true; userInput.disabled = true; showTyping(true); const botResponse = await getAIResponse(message); showTyping(false); addMessage(botResponse, false); sendBtn.disabled = false; userInput.disabled = false; userInput.focus(); } function askSuggestion(text) { userInput.value = text; sendMessage(); } userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) { sendMessage(); } }); </script> </body> </html>
